version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: chargebee-clone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: billingos
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: opz-billing-tool-main-backend
    container_name: billingos-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: ["--bootstrap-ultrasuperadmin=true"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chargebee_dev?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_FLYWAY_OUT_OF_ORDER: "true"
      SPRING_FLYWAY_IGNORE_MISSING_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_ENV: live
    image: opz-billing-tool-main-frontend
    container_name: billingos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
